# Baseline Model Configuration

# Model architecture
model:
  backbone:
    use_3d: true
    arch_3d: 'resnet3d_18'
    pretrained: false
    in_channels: 1  # Grayscale MRI
  
  classifier:
    dropout: 0.5
    num_classes: 2

# Training hyperparameters
training:
  epochs: 50
  batch_size: 4
  learning_rate: 0.0001
  weight_decay: 0.0001
  
  # Optimizer
  optimizer: 'adam'  # adam, adamw, sgd
  
  # Learning rate scheduler
  scheduler:
    type: 'reduce_on_plateau'  # reduce_on_plateau, cosine, step
    patience: 5
    factor: 0.5
    min_lr: 0.000001
  
  # Early stopping
  early_stopping:
    enabled: true
    patience: 10
    metric: 'val_loss'  # val_loss, val_accuracy, val_f1
    mode: 'min'  # min or max
  
  # Class weighting (for imbalanced data)
  use_class_weights: true

# Rejection/Abstention settings
rejection:
  enabled: true
  # Threshold sweep for evaluation
  thresholds: [0.5, 0.6, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]

# Data paths
data:
  metadata_csv: 'data_metadata_adni.csv'
  
# Checkpointing
checkpoint:
  dir: 'checkpoints/baseline'
  save_best_only: true
  monitor: 'val_loss'
  mode: 'min'

# Logging
logging:
  tensorboard_dir: 'runs/baseline'
  log_interval: 10  # Log every N batches
  save_predictions: true  # Save predictions to CSV

# Device
device: 'cuda'  # cuda or cpu
seed: 42
