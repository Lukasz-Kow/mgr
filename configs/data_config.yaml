# Data configuration for MCI classification

# Preprocessing settings
preprocessing:
  target_size: [128, 128, 128]  # (D, H, W) for 3D
  normalize_method: 'zscore'  # 'zscore', 'minmax', or 'none'

# Augmentation settings (applied only to training set)
augmentation:
  enabled: true
  horizontal_flip: true
  rotation_range: 10.0  # degrees
  random_brightness: 0.1  # +/- 10%
  random_contrast: 0.1   # +/- 10%
  elastic_deformation: true   # TorchIO elastic deformation (anatomical variability)
  bias_field: true             # TorchIO bias field (MRI scanner artifacts)

# Dataset splits
splits:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  stratify: true
  random_seed: 42

# DataLoader settings
dataloader:
  batch_size: 4  # Smaller batch size for 3D
  num_workers: 2
  pin_memory: true

# Paths
paths:
  dataset_root: 'Data baseline'
  metadata_csv: 'data_metadata_adni.csv'
